<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <title> MyMckenzie Chatbot</title>
</head>
<body>

    <div class = "container"> 
        <!-- Chatbot Header -->
        <header class="app-header">
            <h1 class="heading"> Hello, I'm MyMckenzie</h1>
            <h2 class="sub-heading"> What is your legal issue...</h2>
        </header>

        <!-- Chat container -->
        <div class="chat-container">
        </div>
        
        <!-- Prompt Container -->
        <div class="prompt-container">
            <div class="prompt-wrapper"> 
                <form action="#" class="prompt-form">
                    <input type="text" placeholder="Ask MyMckenzie" class="prompt-input" required>
                    <div class="prompt-actions">
                        <button id="add-file-button" type="button"    class="material-symbol-rounded"> 
                            <i class="fa-solid fa-paperclip"> </i></button>
                        <button id="send-prompt-button" class="material-symbol-rounded"><i class="fa-solid fa-long-arrow-right"></i>
                            </button>
                    </div>
                </form>    

                <button id="delete-chats-button" type="submit" class="material-symbol-rounded"><i class="fa-solid fa-trash"></i>
                        </button>
            </div>

            <p class="disclaimer"> For legal guidance only — not a substitute for legal advice.</p>
        </div>


        


    </div>

    <script src="chatbot.js"></script>
</body>
</html>
