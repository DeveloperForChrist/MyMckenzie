<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMcKenzie Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        /* Stop button styling to match Send/Attach */
        #stop-button {
            background: var(--black-color);
            border: none;
            color: var(--white-color);
            width: 56px;
            height: 56px;
            border-radius: var(--border-radius-circle);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        #stop-button:hover {
            background: var(--primary-color-light);
            color: var(--white-color);
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <a href="#" class="nav-logo"> 
            <h2 class="logo-text">MyMcKenzie</h2>
        </a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link">Login</a>
            </li>
        </ul>
    </nav>
</header>

<div class="container"> 

    <!-- Chat container -->
    <div class="chat-container"></div>
    
    <!-- Prompt Container -->
    <div class="prompt-container">
        <div class="prompt-wrapper"> 
            <form action="#" class="prompt-form">
                <input type="text" placeholder="Ask MyMcKenzie" class="prompt-input" required>
                <div class="prompt-actions">
                    <button id="add-file-button" type="button" title="Attach a file"> 
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <button id="send-prompt-button" type="submit" title="Send message">
                        <i class="fa-solid fa-long-arrow-right"></i>
                    </button>
                    <button id="stop-button" type="button" title="Stop AI response">
                        <i class="fa-solid fa-square"></i>
                    </button>
                </div>
            </form>    

            <button id="delete-chats-button" type="button" title="Delete all chats">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>

        <p class="disclaimer">For legal guidance only — not a substitute for legal advice.</p>
    </div>

</div>

<script src="chatbot.js"></script>
</body>
</html>
