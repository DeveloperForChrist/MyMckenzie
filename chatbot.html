<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>


    <title>Chatbot Page</title>
</head>
<body>
    <section class="chatbot-hero">
        <h1>Hello, <br> how can I help you today with your case?</h1>
    </section>

    
    <div class ="chat-bar"> 
        <i class ="fa-solid fa-plus" title="Attach"></i>

        <input type= "text" class="chat-input" placeholder="Tell me about your case..." />

        <!-- send button -->
         <button class ="send-button" title="Send">
            <i class = "fa-solid fa-arrow-right" title="Send"></i> 
        </button>
          
    
    </div>

</body>
</html>
